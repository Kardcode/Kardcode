<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link rel="icon" href="images/bg.jpg">


<title>Learn Programming</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, sans-serif;

    background:
    radial-gradient(circle at top left,#2563eb55,transparent 30%),
    radial-gradient(circle at bottom right,#7c3aed55,transparent 30%),
    linear-gradient(135deg,#020617,#0f172a,#111827);

    overflow:hidden;
}

.container{
    width:900px;
    padding:50px;

    border-radius:30px;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.1);

    box-shadow:
    0 0 50px rgba(0,0,0,0.5);

    text-align:center;

    animation:show 1s ease;
}

h1{
    color:white;
    font-size:60px;

    margin-bottom:20px;

    text-shadow:0 0 20px rgba(255,255,255,0.2);
}

p{
    color:#cbd5e1;

    font-size:20px;

    margin-bottom:50px;
}

.buttons{
    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:25px;
}

button{
    padding:20px;

    border:none;
    border-radius:20px;

    color:white;

    font-size:22px;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    position:relative;

    overflow:hidden;
}

button::before{
    content:"";

    position:absolute;

    width:100%;
    height:100%;

    top:0;
    left:-100%;

    background:rgba(255,255,255,0.15);

    transition:0.4s;
}

button:hover::before{
    left:100%;
}

button:hover{
    transform:translateY(-8px) scale(1.03);
}

.btn1{
    background:linear-gradient(45deg,#2563eb,#06b6d4);
}

.btn2{
    background:linear-gradient(45deg,#7c3aed,#9333ea);
}

.btn3{
    background:linear-gradient(45deg,#f59e0b,#facc15);
}

.btn4{
    background:linear-gradient(45deg,#22c55e,#16a34a);
}

.btn5{
    background:linear-gradient(45deg,#ef4444,#dc2626);

    grid-column:span 2;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(50px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>
<body>

<div class="container">

<h1>🚀Learn Programming</h1>

<p>
 Изучай языки программирования и создавай свои проекты 🌐
</p>

<div class="buttons">

<button class="btn1" onclick="openPage()">
JavaScript
</button>

<button class="btn2" onclick="python()">
Python
</button>

<button class="btn3" onclick="cplus()">
C++
</button>

<button class="btn4" onclick="csharp()">
C#
</button>

<button class="btn5" onclick="nice()">
Разработчик сайта
</button>

</div>

</div>

<script>

function openPage(){
    window.location.href = "javasc.html";
}

function python(){
    window.location.href = "python.html";
}

function cplus(){
    window.location.href = "cplus.html";
}

function csharp(){
    window.location.href = "csharp.html";
}

function nice(){
    alert("Создатель сайта:Данил Кардаш ");
}

function a(){window.location.href="python.html"}

</script>

</body>
</html>
